# Bauble configuration — defaults with user override support
#
# Load order:
#   1. User config (~/.config/bauble.conf) — if present, sourced first
#   2. Defaults below — only set variables not already defined
#
# To customize, create ~/.config/bauble.conf with any subset of these variables.
# Environment variables also work: BAUBLE_NOTES_DIR=/my/notes tmux-glow

# ── Source user config (if present) ──
# Env var BAUBLE_CONFIG overrides the default location.
# TRUST BOUNDARY: This file is sourced (executed) as bash. Only point
# BAUBLE_CONFIG at files you control — a malicious config can run arbitrary
# commands. The default (~/.config/bauble.conf) is user-owned and safe.
_BAUBLE_USER_CONF="${BAUBLE_CONFIG:-$HOME/.config/bauble.conf}"
[ -f "$_BAUBLE_USER_CONF" ] && source "$_BAUBLE_USER_CONF"
unset _BAUBLE_USER_CONF

# ── Defaults ──

# Directory for saved snapshots (glow viewer "s" save action)
BAUBLE_SNAPS_DIR="${BAUBLE_SNAPS_DIR:-$HOME/notes/snaps}"

# Directory for quick capture notes
BAUBLE_QUICK_DIR="${BAUBLE_QUICK_DIR:-$HOME/notes/quick}"

# Base directory for notes browsing (tmux-notes)
BAUBLE_NOTES_DIR="${BAUBLE_NOTES_DIR:-$HOME/notes}"

# Maximum items to show in popup menus (markdown viewer, diff viewer, etc.)
BAUBLE_MAX_MENU_ITEMS="${BAUBLE_MAX_MENU_ITEMS:-8}"

# Number of scrollback lines to scan in the current pane.
# Use "-" (or empty) for full scrollback. Larger values are slower but
# find files from earlier in the session.
BAUBLE_SCROLLBACK_LINES="${BAUBLE_SCROLLBACK_LINES:-5000}"

# Seconds of staleness before marking a Claude session as cancelled.
# The agent-status widget checks for panes where hook state AND terminal
# output have both gone quiet for this long.
BAUBLE_CANCEL_THRESHOLD="${BAUBLE_CANCEL_THRESHOLD:-30}"

# Default split width for side viewers (glow, diff, files).
# Viewers use horizontal split at this width when the pane is wide enough,
# otherwise fall back to vertical split at 60%.
BAUBLE_SPLIT_WIDTH="${BAUBLE_SPLIT_WIDTH:-100}"

# Auto-rename tmux windows to "claude" when they still have a default name
# (zsh, bash, fish, sh, or a number). Set to 0 to disable.
BAUBLE_AUTO_RENAME="${BAUBLE_AUTO_RENAME:-1}"

# ── Sounds ──

# Enable/disable sound alerts (set to 0 to silence)
BAUBLE_SOUND_ENABLED="${BAUBLE_SOUND_ENABLED:-1}"

# Custom sound file paths (override platform defaults)
# BAUBLE_SOUND_DONE="/path/to/done.wav"
# BAUBLE_SOUND_WAITING="/path/to/waiting.wav"

# ── Screenshots ──

# Directory to scan for screenshots (default: macOS screencapture location, Linux XDG, or ~/Desktop)
if [ -z "${BAUBLE_SCREENSHOT_DIR:-}" ]; then
  if [ "$(uname -s)" = "Darwin" ]; then
    BAUBLE_SCREENSHOT_DIR="$(defaults read com.apple.screencapture location 2>/dev/null || echo "$HOME/Desktop")"
  else
    # Linux: read XDG user-dirs, fallback to ~/Pictures then ~/Desktop
    if [ -f "$HOME/.config/user-dirs.dirs" ]; then
      XDG_PICTURES_DIR=$(grep '^XDG_PICTURES_DIR=' "$HOME/.config/user-dirs.dirs" 2>/dev/null \
        | head -1 | cut -d= -f2- | tr -d '"' | sed "s|\\\$HOME|$HOME|g")
    fi
    BAUBLE_SCREENSHOT_DIR="${XDG_PICTURES_DIR:-$HOME/Pictures}"
    [ ! -d "$BAUBLE_SCREENSHOT_DIR" ] && BAUBLE_SCREENSHOT_DIR="$HOME/Desktop"
  fi
fi

# Match screenshots by filename pattern (1) or just pick the most recent file (0)
BAUBLE_SCREENSHOT_BY_NAME="${BAUBLE_SCREENSHOT_BY_NAME:-1}"

# Python strftime format for the timestamp in screenshot filenames.
# Default matches macOS format: "Screenshot 2026-02-26 at 6.58.14 PM.png"
# The "Screenshot " prefix and ".png" suffix are added automatically.
BAUBLE_SCREENSHOT_TIME_FMT="${BAUBLE_SCREENSHOT_TIME_FMT:-%Y-%m-%d at %-I.%M.%S %p}"

# ── State colors ──

# Pane background tint (hex)
BAUBLE_COLOR_WORKING="${BAUBLE_COLOR_WORKING:-#1a1e2e}"
BAUBLE_COLOR_WAITING="${BAUBLE_COLOR_WAITING:-#302a1a}"
BAUBLE_COLOR_DONE="${BAUBLE_COLOR_DONE:-#192b1e}"
BAUBLE_COLOR_CANCELLED="${BAUBLE_COLOR_CANCELLED:-#2b1a1a}"

# Tab bar styles (tmux format)
BAUBLE_TAB_WORKING="${BAUBLE_TAB_WORKING:-default}"
BAUBLE_TAB_WAITING="${BAUBLE_TAB_WAITING:-bg=yellow,fg=black,bold}"
BAUBLE_TAB_DONE="${BAUBLE_TAB_DONE:-bg=green,fg=black,bold}"
BAUBLE_TAB_CANCELLED="${BAUBLE_TAB_CANCELLED:-bg=red,fg=white,bold}"
