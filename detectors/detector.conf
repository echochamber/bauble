# Bauble detector configuration
# Maps AI tool process names to their detector scripts.
#
# Format: process_name:detector_script:display_name
#
# process_name  — matched against pane's foreground process (via pgrep or ps)
# detector_script — basename of the detector in this directory
# display_name  — shown in tmux window name (auto-rename)

