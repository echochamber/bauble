# Bauble — tmux configuration for ambient session UX
#
# Add these lines to your ~/.tmux.conf (or source this file directly).

# ── Recommended settings ──

# Note: no after-select-window reset needed. Per-pane @bauble-state tracks
# each pane independently, and pane-tint.sh recomputes the window tab style.
# The working/done/waiting hooks handle clearing state when agents resume.

# Don't let processes override manually-set window names (for tmux-claim-bead)
set -g allow-rename off
set -g automatic-rename off

# Disable bell — bauble uses per-window styles instead
set -g monitor-bell off

# ── Gateway key ──
# Set @bauble-prefix before sourcing to use a different gateway key.
# Default: g (so prefix+g enters the bauble key table)
#
# Example — use prefix+a instead:
#   set -g @bauble-prefix a
#   source-file /path/to/bauble.tmux.conf
#
# The key table bindings (m, b, w, d, etc.) are always the same —
# only the gateway key changes.

# Bind the gateway key (reads @bauble-prefix, defaults to g)
run-shell 'KEY=$(tmux show-option -gqv @bauble-prefix); KEY=${KEY:-g}; tmux bind-key "$KEY" switch-client -T bauble'

# ── Keybindings ──
# All bauble keys live in the "bauble" key table to avoid conflicts.
# The gateway key (above) enters the table, then the next keypress fires.
# All use run-shell -b (background) to avoid blocking the tmux server.

# Bauble key table
bind-key -T bauble m run-shell -b '~/.claude/scripts/tmux-glow'         # markdown viewer
bind-key -T bauble b run-shell -b '~/.claude/scripts/tmux-beads'        # beads dashboard
bind-key -T bauble w run-shell -b '~/.claude/scripts/tmux-worktree'     # worktree picker
bind-key -T bauble d run-shell -b '~/.claude/scripts/tmux-diff'         # diff viewer
bind-key -T bauble f run-shell -b '~/.claude/scripts/tmux-files'        # file:// URL viewer
bind-key -T bauble n run-shell -b '~/.claude/scripts/tmux-notes'        # notes browser
bind-key -T bauble c run-shell -b 'tmux display-popup -w 66 -h 24 -E "bash -l ~/.claude/scripts/tmux-quick-capture"'  # quick capture
bind-key -T bauble s run-shell -b '~/.claude/scripts/tmux-claude-picker' # session picker
bind-key -T bauble a run-shell -b '~/.claude/scripts/tmux-approve-all'  # approve all waiting agents
bind-key -T bauble r run-shell -b 'tmux display-popup -w 50 -h 10 -E "bash -l ~/.claude/scripts/tmux-session-rename #{pane_id}"'  # rename session
bind-key -T bauble S run-shell -b '~/.claude/scripts/tmux-paste-screenshot' # paste latest screenshot path
bind-key -T bauble ? run-shell -b '~/.claude/scripts/tmux-cheatsheet'   # keybinding reference

# Session navigator (direct prefix bindings for high-frequency cycling)
bind-key Home run-shell -b '~/.claude/scripts/tmux-claude-next'         # next waiting agent
bind-key End  run-shell -b '~/.claude/scripts/tmux-claude-breadcrumb'   # go back

# ── Pre-fork daemon (optional) ──
# Start the daemon for near-instant popup startup.
# Cold start is ~135ms which is fine; daemon brings it to ~0ms.
# Uncomment to auto-start:
# run-shell -b 'command -v bauble-daemon >/dev/null && bauble-daemon start'

# ── Optional integrations (off by default) ──
# These would touch settings you may already have configured (status bar,
# terminal features), so they're opt-in. Set the option BEFORE sourcing
# this file to enable.

# Status bar widget — appends agent-status (🟡2 ✓3) to status-right.
# Uses set -ag so it adds to whatever you already have there.
#   set -g @bauble-statusbar on
# Note: the literal `#` is built via printf because tmux's run-shell parser
# treats `#(...)` as a format placeholder and strips it.
run-shell 'V=$(tmux show-option -gqv @bauble-statusbar); if [ "$V" = "on" ]; then tmux set -ag status-right " $(printf %s \#)(~/.claude/scripts/tmux-agent-status)"; tmux set -g status-interval 5; fi; exit 0'

# Terminal hyperlinks (OSC 8 clickable file:// URLs).
# Set to your terminal's terminfo name:
#   set -g @bauble-hyperlinks xterm-ghostty       # Ghostty
#   set -g @bauble-hyperlinks xterm-256color      # iTerm2 / most others
run-shell 'V=$(tmux show-option -gqv @bauble-hyperlinks); if [ -n "$V" ] && [ "$V" != "off" ]; then tmux set -as terminal-features ",${V}:hyperlinks"; fi; exit 0'
